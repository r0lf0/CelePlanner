services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - postgres

  postgres:
    image: postgres:13-alpine
    container_name: postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
